interface:
  display_name: "Secret Manager"
  short_description: "Use chat-unsafe credentials by name without exposing values"
  default_prompt: "Use $secret-manager whenever a task needs any real value that should not be pasted into chat, including API keys, tokens, passwords, service keys, DB credentials, private keys, or pasted-looking credentials with unknown prefixes. Handle only the secret name, purpose, and destination. Open a visible terminal for the user to enter the value outside chat; use native CLI prompts when available, or run-with-secret.sh for one-time local commands."
