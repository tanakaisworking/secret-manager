interface:
  display_name: "Secret Manager"
  short_description: "Use chat-unsafe credentials by name without exposing values"
  default_prompt: "Use $secret-manager whenever a task needs any real value that should not be pasted into chat, including API keys, tokens, passwords, service keys, DB credentials, private keys, or pasted-looking credentials with unknown prefixes. Handle only the secret name, purpose, and destination. Open a visible terminal and use a normal visible input prompt; do not use hidden or masked password boxes. Use run-with-secret.sh for one-time local commands, keychain-set-secret.sh for macOS Keychain persistence, or secret-session for several commands in one bounded memory-only session."
